function genEmail({student,type,data}) {
  const d=fmtDate(todayStr());
  const g=`Assalamu Alaikum wa Rahmatullahi wa Barakatuh,\n\nDear ${student.parentName||"Parent/Guardian"},\n\n`;
  const c=`\n\nJazakAllahu Khairan for your continued support in ${student.name}'s Hifz journey.\n\nWarm regards,\n${TEACHER_NAME}\n${ACADEMY_NAME} — ${ACADEMY_SUBTITLE}`;
  if(type==="absence") return g+`This is to inform you that ${student.name} was absent from class today, ${d}.\n\n${data?.reason?`Reason noted: ${data.reason}\n\n`:""}Regular attendance is critical for Hifz continuity. Please ensure ${student.name} continues home revision.`+c;
  if(type==="tardy") return g+`${student.name} arrived late to class today, ${d}${data?.time?` at ${data.time}`:""}.`+`\n\nPunctuality is important as the start of class is dedicated to Sabaq. Please ensure timely arrival.`+c;
  if(type==="progress") return g+`Here is a progress update for ${student.name} as of ${d}.\n\n📖 Juz Memorized: ${(student.juzMemorized||[]).length} / 30\n📝 Current Sabaq: ${data?.currentSabaq||"—"}\n🔄 Manzil Status: ${data?.manzilStatus||"On track"}\n\n${data?.notes?`Notes: ${data.notes}\n\n`:""}Please support ${student.name} with daily home revision.`+c;
  if(type==="incident") return g+`I am writing regarding an incident involving ${student.name} on ${d}.\n\n${data?.description||""}\n\n${data?.action?`Action taken: ${data.action}\n\n`:""}Please contact me at your earliest convenience.`+c;
  if(type==="juztest") return g+`الحمد لله — ${student.name} has successfully passed the Juz Test for Juz ${data?.juz||""} on ${d}!\n\n${data?.notes?`Notes: ${data.notes}\n\n`:""}This is a significant achievement. May Allah accept this effort and make it a means of barakah for your entire family.`+c;
  if(type==="goal") return g+`الحمد لله — ${student.name} has achieved a personal Hifz goal!\n\n🎯 Goal: ${data?.goalTitle||""}\n📅 Achieved on: ${d}\n\nWe are so proud of ${student.name}'s dedication. May Allah continue to bless this journey.`+c;
  return g+c;
}

      <div className={`mo-box fi ${wide?"wide":""}`}>

        <div className="mo-body">{children}</div>
        {footer&&<div className="mo-ft">{footer}</div>}
      </div>
    </div>
  );
}

function JuzGrid({selected=[],partial=[],onChange}) {
  const toggle=j=>selected.includes(j)?onChange(selected.filter(x=>x!==j),partial):onChange([...selected,j],partial.filter(x=>x!==j));
  const toggleP=(j,e)=>{e.preventDefault();partial.includes(j)?onChange(selected,partial.filter(x=>x!==j)):onChange(selected.filter(x=>x!==j),[...partial,j]);};
  return (
    <div>
      <div className="fl g8 mb8" style={{fontSize:11,color:"#6b6060"}}>
        <span>🟢 Memorized (click)</span>
        <span>🟡 In Progress (right-click)</span>
      </div>
      <div className="jg">
        {Array.from({length:30},(_,i)=>i+1).map(j=>(
          <div key={j} className={`jc ${selected.includes(j)?"mem":partial.includes(j)?"par":"non"}`}
            onClick={()=>toggle(j)} onContextMenu={e=>toggleP(j,e)} title={`Juz ${j}`}>
            <span style={{fontSize:13}}>{j}</span><span style={{fontSize:8,opacity:.65}}>جز</span>
          </div>
        ))}
      </div>
    </div>
  );
}
function ClassAttendanceView({state,setState,date}) {
  const {students,attendance}=state;
  const setAtt=(sid,d,status)=>setState(p=>{
    const a={...p.attendance};a[sid]={...a[sid]};
    if(!status)delete a[sid][d];else a[sid][d]=status;
    return {...p,attendance:a};
  });
  if(!students.length) return <div className="tdm tsm tc" style={{padding:"20px 0"}}>No students enrolled yet.</div>;
  return (
    <div>
      {students.map(s=>{
        const att=(attendance[s.id]||{})[date];
        return (
          <div key={s.id} className="att-student-row">
            <div>
              <div className="fw6">{s.name}</div>
              <div className="txs tdm">{(s.juzMemorized||[]).length} Juz memorized</div>
            </div>
            <div className="att-btns">
              {["present","tardy","absent"].map(st=>(
                <button key={st} className={`att-btn ${st} ${att===st?"on":""}`}
                  onClick={()=>setAtt(s.id,date,att===st?undefined:st)}>
                  {st.charAt(0).toUpperCase()+st.slice(1)}
                </button>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}
function AttCalView({studentId,attendance,onMark}) {
  const [vd,setVd]=useState(new Date());
  const y=vd.getFullYear(),m=vd.getMonth();
  const firstDay=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  const att=attendance[studentId]||{};
  const today=todayStr();
  const days=[];
  for(let i=0;i<firstDay;i++)days.push({empty:true});
  for(let d=1;d<=dim;d++){const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;days.push({d,ds,status:att[ds]});}
  const mPfx=`${y}-${String(m+1).padStart(2,"0")}`;
  const mAtt=Object.entries(att).filter(([k])=>k.startsWith(mPfx));
  return (
    <div>
      <div className="fl fla flb mb12">
        <button className="btn btn-s btn-sm" onClick={()=>setVd(new Date(y,m-1,1))}>‹</button>
        <span className="fw6">{vd.toLocaleDateString("en-US",{month:"long",year:"numeric"})}</span>
        <button className="btn btn-s btn-sm" onClick={()=>setVd(new Date(y,m+1,1))}>›</button>
      </div>
      <div className="fl g8 mb12">
        <span className="bdg bdg-g">Present: {mAtt.filter(([,v])=>v==="present").length}</span>
        <span className="bdg bdg-r">Absent: {mAtt.filter(([,v])=>v==="absent").length}</span>
        <span className="bdg bdg-o">Tardy: {mAtt.filter(([,v])=>v==="tardy").length}</span>
      </div>
      <div className="cal-g">
        {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} className="cal-dh">{d}</div>)}
        {days.map((day,i)=>day.empty?<div key={i} className="cal-d emp"/>
          :<div key={day.ds} className={`cal-d ${day.status||"norec"} ${day.ds===today?"today-d":""}`}
              onClick={()=>{const cy=[undefined,"present","absent","tardy"];const ci=cy.indexOf(day.status);onMark(studentId,day.ds,cy[(ci+1)%cy.length]);}}>
            {day.d}
          </div>
        )}
      </div>
      <div className="txs tdm mt8">Click to cycle: no record → present → absent → tardy</div>
    </div>
  );
}
function Dashboard({state,setState,setView,setSel}) {
  const [dashDate,setDashDate]=useState(todayStr());
  const {students,attendance,logs,awards,incidents}=state;
  const wk=weekKey(dashDate),mn=monthKey(dashDate);
  const isToday=dashDate===todayStr();
  const present=students.filter(s=>(attendance[s.id]||{})[dashDate]==="present").length;
  const absent=students.filter(s=>(attendance[s.id]||{})[dashDate]==="absent").length;
  const tardy=students.filter(s=>(attendance[s.id]||{})[dashDate]==="tardy").length;
  const sow=awards.weekly[wk]?students.find(s=>s.id===awards.weekly[wk]):null;
  const som=awards.monthly[mn]?students.find(s=>s.id===awards.monthly[mn]):null;
  const [awMd,setAwMd]=useState(null);
  const [awSel,setAwSel]=useState("");
  const [awSuggestion,setAwSuggestion]=useState(null);
  const [awLoading,setAwLoading]=useState(false);
  const saveAward=()=>{
    if(!awSel)return;
    setState(p=>{const n={...p,awards:{...p.awards}};
      if(awMd==="weekly")n.awards.weekly={...p.awards.weekly,[wk]:awSel};
      else n.awards.monthly={...p.awards.monthly,[mn]:awSel};
      return n;
    });
    setAwMd(null);setAwSel("");setAwSuggestion(null);
  };
  const clearAward=(type)=>{
    setState(p=>{const n={...p,awards:{...p.awards}};
      if(type==="weekly"){const w={...p.awards.weekly};delete w[wk];n.awards.weekly=w;}
      else{const m={...p.awards.monthly};delete m[mn];n.awards.monthly=m;}
      return n;
    });
  };
  const suggestAward=async()=>{
    setAwLoading(true);setAwSuggestion(null);
    const period=awMd==="weekly"?7:30;
    const cutoff=new Date(dashDate+"T12:00:00");cutoff.setDate(cutoff.getDate()-period);
    const cutStr=cutoff.toISOString().slice(0,10);
    const summaries=students.map(s=>{
      const sl=(logs[s.id]||[]).filter(l=>l.date>=cutStr&&l.date<=dashDate);
      const att=Object.entries(attendance[s.id]||{}).filter(([k])=>k>=cutStr&&k<=dashDate);
      const presents=att.filter(([,v])=>v==="present").length;
      const mistakes=sl.flatMap(l=>l.mistakeTypes||[]).length;
      const sabqiPass=sl.filter(l=>l.sabqiResult==="pass").length;
      const manzilPass=sl.filter(l=>l.manzilResult==="pass").length;
      return `${s.name}: ${sl.length} sessions, ${sabqiPass} sabqi passes, ${manzilPass} manzil passes, ${mistakes} mistakes, ${presents} days present`;
    }).join("\n");
    try {
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        model:"claude-sonnet-4-6",max_tokens:300,
        system:"You are a Hifz class assistant. Suggest ONE student for an award with a 2-3 sentence reason. Format:\nSTUDENT: [name]\nREASON: [reason]",
        messages:[{role:"user",content:`Suggest the ${awMd==="weekly"?"Student of the Week":"Student of the Month"} based on last ${period} days:\n\n${summaries}`}]
      })});
      const data=await res.json();
      const text=data.content?.map(b=>b.text||"").join("")||"";
      const nm=text.match(/STUDENT:\s*(.+)/i);
      const rm=text.match(/REASON:\s*([\s\S]+)/i);
      if(nm)setAwSuggestion({name:nm[1].trim(),reason:rm?rm[1].trim():""});
    }catch{}
    setAwLoading(false);
  };
  const dayLogs=students.flatMap(s=>(logs[s.id]||[]).filter(l=>l.date===dashDate).map(l=>({...l,sn:s.name,sid:s.id})));
  const dayInc=students.flatMap(s=>(incidents[s.id]||[]).filter(i=>i.date===dashDate).map(i=>({...i,sn:s.name})));
  return (
    <div className="fi">

        <div className="date-nav">
          <button className="date-nav-btn" onClick={()=>setDashDate(prevDay(dashDate))}>‹ Prev</button>
          <div className="date-nav-today">{isToday?"Today — ":""}{fmtDate(dashDate)}</div>
          <button className="date-nav-btn" onClick={()=>setDashDate(nextDay(dashDate))} disabled={dashDate>=todayStr()} style={{opacity:dashDate>=todayStr()?0.4:1}}>Next ›</button>
          {!isToday&&<button className="btn btn-s btn-sm" onClick={()=>setDashDate(todayStr())}>Today</button>}
        </div>
        <div className="txs tdm">{fmtDateFull(dashDate)}</div>
      </div>
      <div className="sg">
        <div className="sc"><div className="sv" style={{color:"#1a6b6b"}}>{students.length}</div><div className="sl">Total Students</div></div>
        <div className="sc"><div className="sv" style={{color:"#2a6444"}}>{present}</div><div className="sl">Present</div></div>
        <div className="sc"><div className="sv" style={{color:"#892020"}}>{absent}</div><div className="sl">Absent</div></div>
        <div className="sc"><div className="sv" style={{color:"#9a4e10"}}>{tardy}</div><div className="sl">Tardy</div></div>
      </div>
      <div className="g2 mb20">

            </div>

function StudentList({state,setState,setView,setSel}) {

  const [form,setForm]=useState({...blank});
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));
  const add=()=>{if(!form.name.trim())return;setState(p=>({...p,students:[...p.students,{...form,id:uid()}]}));setForm({...blank});setShowAdd(false);};
  const toggleSort=(col)=>{if(sortBy===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortBy(col);setSortDir("desc");}};

  });
  const filtered=sorted.filter(s=>s.name.toLowerCase().includes(search.toLowerCase())||(s.parentName||"").toLowerCase().includes(search.toLowerCase()));
  return (
    <div className="fi">
      <div className="fl fla flb mb20">
        <div><div className="tb-title">Students</div><div className="tsb tsm">{state.students.length} enrolled</div></div>
        <button className="btn btn-p" onClick={()=>setShowAdd(true)}>+ Add Student</button>
      </div>
      <div className="card">
        <div className="fl fla g12 mb16" style={{flexWrap:"wrap"}}>
          <input className="inp" style={{maxWidth:260}} placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)}/>
          <div className="fl g8 fla">
            <span className="txs tdm">Sort:</span>
            <button className={`btn btn-sm ${sortBy==="name"?"btn-p":"btn-s"}`} onClick={()=>toggleSort("name")}>Name {sortBy==="name"?(sortDir==="asc"?"↑":"↓"):""}</button>
            <button className={`btn btn-sm ${sortBy==="juz"?"btn-p":"btn-s"}`} onClick={()=>toggleSort("juz")}>Juz {sortBy==="juz"?(sortDir==="asc"?"↑":"↓"):""}</button>
          </div>
        </div>

              return <tr key={s.id}>

      </div>
      {showAdd&&<Modal title="Add New Student" onClose={()=>setShowAdd(false)} wide
        footer={<><button className="btn btn-s" onClick={()=>setShowAdd(false)}>Cancel</button><button className="btn btn-p" onClick={add}>Add Student</button></>}>
        <div className="g2">
          <Field label="Student Name *"><input className="inp" value={form.name} onChange={e=>F("name",e.target.value)}/></Field>
          <Field label="Date of Birth"><input className="inp" type="date" value={form.dob} onChange={e=>F("dob",e.target.value)}/></Field>
          <Field label="Parent Name"><input className="inp" value={form.parentName} onChange={e=>F("parentName",e.target.value)}/></Field>
          <Field label="Parent Email"><input className="inp" type="email" value={form.parentEmail} onChange={e=>F("parentEmail",e.target.value)}/></Field>
          <Field label="Parent Phone"><input className="inp" value={form.parentPhone} onChange={e=>F("parentPhone",e.target.value)}/></Field>
          <Field label="Enrollment Date"><input className="inp" type="date" value={form.enrollDate} onChange={e=>F("enrollDate",e.target.value)}/></Field>
        </div>
        <Field label="Juz Memorized"><JuzGrid selected={form.juzMemorized} partial={form.juzPartial} onChange={(m,p)=>setForm(f=>({...f,juzMemorized:m,juzPartial:p}))}/></Field>
        <Field label="Notes"><textarea className="inp" value={form.notes} onChange={e=>F("notes",e.target.value)}/></Field>
      </Modal>}
    </div>
  );
}
function StudentDetail({studentId,state,setState,onBack}) {
  const student=state.students.find(s=>s.id===studentId);
  const [tab,setTab]=useState("overview");
  const [logMd,setLogMd]=useState(null);
  const [incMd,setIncMd]=useState(null);
  const [grvMd,setGrvMd]=useState(null);
  const [emailMd,setEmailMd]=useState(null);
  const [editMd,setEditMd]=useState(false);
  const [juzTestMd,setJuzTestMd]=useState(false);
  const [goalMd,setGoalMd]=useState(null);
  const [editF,setEditF]=useState(student||{});
  const lastLog=(state.logs[studentId]||[]).slice(-1)[0];
  const blankLog={
    date:todayStr(),
    sabaqStartSurah:lastLog?.sabaqEndSurah||"",sabaqStartAyah:lastLog?.sabaqEndAyah||"",
    sabaqEndSurah:"",sabaqEndAyah:"",
    sabaqJuzStart:"",sabaqQStart:null,sabaqJuzEnd:"",sabaqQEnd:null,
    sabaqLate:false,sabaqLateReason:"",
    leftEarly:false,leftEarlyTime:"",leftEarlyReason:"",
    lateLunch:false,lateLunchTime:"",lateLunchReason:"",
    sabqiResult:"",
    manzilJuzStart:"",manzilQStart:null,manzilJuzEnd:"",manzilQEnd:null,
    manzilResult:"",mistakeTypes:[],generalNotes:""
  };
  const [lf,setLf]=useState({...blankLog});
  const Lf=(k,v)=>setLf(f=>({...f,[k]:v}));
  const blankInc={date:todayStr(),description:"",action:""};
  const blankGrv={date:todayStr(),description:"",resolution:""};
  const [incF,setIncF]=useState({...blankInc});
  const [grvF,setGrvF]=useState({...blankGrv});
  const [jtF,setJtF]=useState({date:todayStr(),juz:"",result:"pass",notes:""});
  const [goalF,setGoalF]=useState({title:"",description:"",targetDate:"",type:"juz_month",achieved:false});
  if(!student)return <div className="tdm">Student not found.</div>;
  const logs=state.logs[studentId]||[];
  const incidents=state.incidents[studentId]||[];
  const grievances=state.grievances[studentId]||[];
  const juzTests=state.juzTests?.[studentId]||[];
  const goals=state.goals?.[studentId]||[];
  const att=state.attendance[studentId]||{};
  const markAtt=(sid,ds,status)=>setState(p=>{const a={...p.attendance};a[sid]={...a[sid]};if(!status)delete a[sid][ds];else a[sid][ds]=status;return {...p,attendance:a};});
  const saveLog=()=>{
    const logData={...lf,id:logMd?.edit?.id||uid()};
    setState(p=>{const ex=p.logs[studentId]||[];const up=logMd?.edit?ex.map(l=>l.id===logData.id?logData:l):[...ex,logData];return {...p,logs:{...p.logs,[studentId]:up}};});
    setLf({...blankLog});setLogMd(null);
  };
  const deleteLog=(id)=>setState(p=>({...p,logs:{...p.logs,[studentId]:(p.logs[studentId]||[]).filter(l=>l.id!==id)}}));
  const saveInc=()=>{
    const data={...incF,id:incMd?.edit?.id||uid()};
    setState(p=>{const ex=p.incidents[studentId]||[];const up=incMd?.edit?ex.map(x=>x.id===data.id?data:x):[...ex,data];return {...p,incidents:{...p.incidents,[studentId]:up}};});
    setIncMd(null);
    if(!incMd?.edit)setEmailMd({type:"incident",data:{description:incF.description,action:incF.action}});
  };
  const deleteInc=(id)=>setState(p=>({...p,incidents:{...p.incidents,[studentId]:(p.incidents[studentId]||[]).filter(x=>x.id!==id)}}));
  const saveGrv=()=>{
    const data={...grvF,id:grvMd?.edit?.id||uid()};
    setState(p=>{const ex=p.grievances[studentId]||[];const up=grvMd?.edit?ex.map(x=>x.id===data.id?data:x):[...ex,data];return {...p,grievances:{...p.grievances,[studentId]:up}};});
    setGrvMd(null);
  };
  const deleteGrv=(id)=>setState(p=>({...p,grievances:{...p.grievances,[studentId]:(p.grievances[studentId]||[]).filter(x=>x.id!==id)}}));
  const saveJuzTest=()=>{
    setState(p=>({...p,juzTests:{...p.juzTests,[studentId]:[...(p.juzTests?.[studentId]||[]),{...jtF,id:uid()}]}}));
    if(jtF.result==="pass")setEmailMd({type:"juztest",data:{juz:jtF.juz,notes:jtF.notes}});
    setJuzTestMd(false);setJtF({date:todayStr(),juz:"",result:"pass",notes:""});
  };
  const saveGoal=()=>{
    const data={...goalF,id:goalMd?.edit?.id||uid(),createdDate:goalMd?.edit?.createdDate||todayStr()};
    setState(p=>{const ex=p.goals?.[studentId]||[];const up=goalMd?.edit?ex.map(x=>x.id===data.id?data:x):[...ex,data];return {...p,goals:{...p.goals,[studentId]:up}};});

  const markGoalAchieved=(gid)=>{

    const g=goals.find(x=>x.id===gid);
    if(g)setEmailMd({type:"goal",data:{goalTitle:g.title}});
  };
  const deleteGoal=(id)=>setState(p=>({...p,goals:{...p.goals,[studentId]:(p.goals?.[studentId]||[]).filter(x=>x.id!==id)}}));
  const saveEdit=()=>{setState(p=>({...p,students:p.students.map(s=>s.id===studentId?{...editF,id:studentId}:s)}));setEditMd(false);};

  const mistakeFreq={};allMistakes.forEach(m=>mistakeFreq[m]=(mistakeFreq[m]||0)+1);
  const topMistakes=Object.entries(mistakeFreq).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const emailBody=emailMd?genEmail({student,type:emailMd.type,data:emailMd.data}):"";
  const openLogEdit=(log)=>{setLf({...blankLog,...log});setLogMd({edit:log});};
  const openIncEdit=(inc)=>{setIncF({...blankInc,...inc});setIncMd({edit:inc});};
  const openGrvEdit=(grv)=>{setGrvF({...blankGrv,...grv});setGrvMd({edit:grv});};

            <div style={{width:48,height:48,borderRadius:"50%",background:"#1a6b6b",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:20,fontFamily:"Cormorant Garamond,serif",fontWeight:700,flexShrink:0}}>{student.name[0]}</div>
            <div>
              <div className="ts" style={{fontSize:22,fontWeight:700}}>{student.name}</div>
              <div className="tsb tsm">{student.parentName||"—"} · {student.parentEmail||"No email"}</div>
              <div className="fl g8 mt8">
                <span className="bdg bdg-t">{(student.juzMemorized||[]).length}/30 Juz</span>
                {student.enrollDate&&<span className="bdg bdg-gr">Since {fmtDate(student.enrollDate)}</span>}
              </div>
            </div>
          </div>
          <div className="fl g8" style={{flexWrap:"wrap"}}>
            <button className="btn btn-s btn-sm" onClick={()=>{setEditF({...student});setEditMd(true);}}>Edit</button>
            <button className="btn btn-p btn-sm" onClick={()=>{setLf({...blankLog});setLogMd("add");}}>+ Log Session</button>
            <button className="btn btn-s btn-sm" onClick={()=>setJuzTestMd(true)}>Juz Test</button>
            <button className="btn btn-d btn-sm" onClick={()=>{setIncF({...blankInc});setIncMd("add");}}>Report Incident</button>
            <button className="btn btn-s btn-sm" onClick={()=>{setGrvF({...blankGrv});setGrvMd("add");}}>Log Grievance</button>
          </div>
        </div>
      </div>
      <div className="tabs">
        {["overview","sessions","attendance","juz map","patterns","juz tests","goals","incidents","emails"].map(t=>(
          <button key={t} className={`tab ${tab===t?"on":""}`} onClick={()=>setTab(t)}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>
        ))}
      </div>
      {tab==="overview"&&(
        <div>

            <div className="sc"><div className="sv" style={{color:"#2a6444"}}>{totalP}</div><div className="sl">Days Present</div></div>

            <div className="sc"><div className="sv" style={{color:"#9a4e10"}}>{totalT}</div><div className="sl">Days Tardy</div></div>
            <div className="sc"><div className="sv" style={{color:"#1a6b6b"}}>{Math.round(sabqiPass/sabqiTot*100)}%</div><div className="sl">Sabqi Pass Rate</div></div>
            <div className="sc"><div className="sv" style={{color:"#1a6b6b"}}>{Math.round(manzPass/manzTot*100)}%</div><div className="sl">Manzil Pass Rate</div></div>

function Reports({state}) {
  const [period,setPeriod]=useState("monthly");
  const [reportDate,setReportDate]=useState(todayStr().slice(0,7));
  const [forStudent,setForStudent]=useState("");
  const [text,setText]=useState("");
  const generate=()=>{
    const {students,logs,attendance,incidents,grievances,juzTests}=state;
    const today=todayStr();
    let startDate,endDate,label;
    if(period==="daily"){startDate=reportDate.length===10?reportDate:today;endDate=startDate;label=fmtDate(startDate);}
    else if(period==="weekly"){
      const dt=new Date((reportDate.length===10?reportDate:today)+"T12:00:00");
      const day=dt.getDay();
      const sun=new Date(dt);sun.setDate(dt.getDate()-day);
      const sat=new Date(sun);sat.setDate(sun.getDate()+6);
      startDate=sun.toISOString().slice(0,10);endDate=sat.toISOString().slice(0,10);
      label=`Week of ${fmtDate(startDate)}`;
    } else {
      const pfx=reportDate.length>=7?reportDate.slice(0,7):today.slice(0,7);
      startDate=pfx+"-01";
      const lastDay=new Date(parseInt(pfx.slice(0,4)),parseInt(pfx.slice(5,7)),0).getDate();
      endDate=pfx+"-"+String(lastDay).padStart(2,"0");
      label=new Date(pfx+"-15").toLocaleDateString("en-US",{month:"long",year:"numeric"});
    }
    const ts=forStudent?students.filter(s=>s.id===forStudent):students;
    const lines=[];
    lines.push("═══════════════════════════════════════════════════════");
    lines.push(ACADEMY_NAME);
    lines.push(ACADEMY_SUBTITLE+` — ${period.charAt(0).toUpperCase()+period.slice(1)} Report`);
    lines.push("Teacher: "+TEACHER_NAME);
    lines.push("Period: "+label);
    lines.push("Generated: "+fmtDate(today));
    lines.push("═══════════════════════════════════════════════════════\n");
    ts.forEach(s=>{
      const sl=(logs[s.id]||[]).filter(l=>l.date>=startDate&&l.date<=endDate);
      const sa=Object.entries(attendance[s.id]||{}).filter(([k])=>k>=startDate&&k<=endDate);
      const p=sa.filter(([,v])=>v==="present").length;
      const a=sa.filter(([,v])=>v==="absent").length;
      const t=sa.filter(([,v])=>v==="tardy").length;
      const sp=sl.filter(l=>l.sabqiResult==="pass").length;const st2=sl.filter(l=>l.sabqiResult).length||1;
      const mp=sl.filter(l=>l.manzilResult==="pass").length;const mt=sl.filter(l=>l.manzilResult).length||1;
      const inc=(incidents[s.id]||[]).filter(i=>i.date>=startDate&&i.date<=endDate);
      const grv=(grievances[s.id]||[]).filter(g=>g.date>=startDate&&g.date<=endDate);
      const jt=(juzTests?.[s.id]||[]).filter(t=>t.date>=startDate&&t.date<=endDate);
      const mistakes=sl.flatMap(l=>l.mistakeTypes||[]);
      const mf={};mistakes.forEach(m=>mf[m]=(mf[m]||0)+1);
      const top=Object.entries(mf).sort((a2,b2)=>b2[1]-a2[1]).slice(0,3);
      lines.push(`── ${s.name} ──`);
      lines.push(`  Juz Memorized: ${(s.juzMemorized||[]).length} / 30`);
      lines.push(`  Attendance: Present ${p} | Absent ${a} | Tardy ${t}`);
      lines.push(`  Sessions: ${sl.length} | Sabqi Pass: ${Math.round(sp/st2*100)}% | Manzil Pass: ${Math.round(mp/mt*100)}%`);
      lines.push(`  Late Sabaq: ${sl.filter(l=>l.sabaqLate).length} | Left Early: ${sl.filter(l=>l.leftEarly).length} | Late Lunch: ${sl.filter(l=>l.lateLunch).length}`);
      if(top.length)lines.push(`  Common mistakes: ${top.map(([m,c])=>`${m} (${c}×)`).join(", ")}`);
      if(jt.length)lines.push(`  Juz Tests: ${jt.map(t=>`Juz ${t.juz} — ${t.result}`).join(", ")}`);
      if(inc.length){lines.push(`  ⚠ Incidents (${inc.length}):`);inc.forEach(i=>lines.push(`    • ${fmtDate(i.date)}: ${i.description}`));}
      if(grv.length){lines.push(`  Grievances (${grv.length}):`);grv.forEach(g=>lines.push(`    • ${fmtDate(g.date)}: ${g.description}`));}
      if(sl.length){
        lines.push(`  Sessions detail:`);
        sl.forEach(l=>{
          const from=l.sabaqStartSurah?`${SURAHS.find(s=>s.n===l.sabaqStartSurah)?.name} ${l.sabaqStartAyah}`:juzQuarterLabel(l.sabaqJuzStart,l.sabaqQStart);
          const to=l.sabaqEndSurah?`${SURAHS.find(s=>s.n===l.sabaqEndSurah)?.name} ${l.sabaqEndAyah}`:juzQuarterLabel(l.sabaqJuzEnd,l.sabaqQEnd);
          lines.push(`    ${fmtDate(l.date)}: ${from} → ${to} | Sabqi: ${l.sabqiResult||"—"} | Manzil: ${l.manzilResult||"—"}`);
        });
      }
      lines.push("");
    });
    setText(lines.join("\n"));
  };
  return (
    <div className="fi">
      <div className="tb-title mb20">Reports</div>
      <div className="card mb20">
        <div className="ctitle">Generate Report</div>
        <div className="g3 mb16">
          <Field label="Period">
            <select className="inp sel" value={period} onChange={e=>setPeriod(e.target.value)}>
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
            </select>
          </Field>
          <Field label={period==="daily"?"Date":"Month"}>
            <input className="inp" type={period==="daily"?"date":"month"} value={reportDate} onChange={e=>setReportDate(e.target.value)}/>
          </Field>
          <Field label="Student (blank = all)">
            <select className="inp sel" value={forStudent} onChange={e=>setForStudent(e.target.value)}>
              <option value="">All Students</option>
              {state.students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          </Field>
        </div>
        <button className="btn btn-p" onClick={generate}>Generate Report</button>
      </div>
      {text&&<div className="card">
        <div className="fl fla flb mb16"><div className="ctitle mb0">Report</div><button className="btn btn-s btn-sm" onClick={()=>navigator.clipboard.writeText(text)}>Copy</button></div>
        <div className="ep" style={{fontFamily:"DM Sans,sans-serif",fontSize:12}}>{text}</div>
      </div>}
    </div>
  );
}

          <div className="content">
            {view==="dashboard"&&<Dashboard state={state} setState={setState} setView={setView} setSel={setSel}/>}
            {view==="students"&&<StudentList state={state} setState={setState} setView={setView} setSel={setSel}/>}
            {view==="student"&&sel&&<StudentDetail studentId={sel} state={state} setState={setState} onBack={()=>setView("students")}/>}
            {view==="reports"&&<Reports state={state}/>}
          </div>
        </main>
      </div>
    </>
  );
}

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<HifzAcademy />);
  </script>
</body>
</html>
