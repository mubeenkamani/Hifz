<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ICF Quran Academy — Hifz Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --teal-900: #0d2b2b;
  --teal-800: #133d3d;
  --teal-700: #1a5050;
  --teal-600: #216464;
  --teal-500: #2a7d7d;
  --teal-400: #3a9d9d;
  --teal-300: #60bcbc;
  --teal-200: #97d8d8;
  --teal-100: #d0efef;
  --teal-50:  #eef8f8;
  --gold-700: #8a6200;
  --gold-600: #b07d00;
  --gold-500: #c9910d;
  --gold-400: #dea827;
  --gold-300: #e9c05a;
  --gold-200: #f2d88a;
  --gold-100: #faeec6;
  --gold-50:  #fdf8eb;
  --bg: #f4f7f7;
  --surface: #ffffff;
  --surface2: #f0f5f5;
  --border: #d4e4e4;
  --text-primary: #0d2b2b;
  --text-secondary: #3a5f5f;
  --text-muted: #7a9a9a;
  --shadow-sm: 0 1px 3px rgba(13,43,43,0.08);
  --shadow-md: 0 4px 16px rgba(13,43,43,0.10);
  --shadow-lg: 0 8px 32px rgba(13,43,43,0.13);
  --radius: 10px;
  --radius-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  font-size: 14px;
}
h1,h2,h3,h4,h5 { font-family: 'Cormorant Garamond', serif; }
/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--teal-50); }
::-webkit-scrollbar-thumb { background: var(--teal-300); border-radius: 3px; }

/* Layout */
.app-shell { display: flex; min-height: 100vh; }
.sidebar {
  width: 240px; min-width: 240px;
  background: var(--teal-900);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 100;
  box-shadow: 2px 0 16px rgba(0,0,0,0.18);
}
.sidebar-logo {
  padding: 24px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-logo .academy-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; font-weight: 600;
  color: var(--gold-300);
  line-height: 1.3;
}
.sidebar-logo .teacher-name {
  font-size: 11px; color: var(--teal-300);
  margin-top: 4px; font-weight: 400;
}
.sidebar-logo .crescent {
  font-size: 28px; margin-bottom: 8px;
  display: block;
}
.sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-section-label {
  font-size: 10px; font-weight: 600;
  color: var(--teal-400); letter-spacing: 1.2px;
  text-transform: uppercase;
  padding: 12px 20px 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px;
  color: rgba(255,255,255,0.72);
  cursor: pointer;
  font-size: 13.5px; font-weight: 400;
  transition: all 0.15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active {
  background: rgba(58,157,157,0.18);
  color: var(--gold-300);
  border-left: 3px solid var(--gold-400);
  font-weight: 500;
}
.nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
  font-size: 11px; color: var(--teal-400);
}

/* Main content */
.main-content {
  margin-left: 240px;
  flex: 1;
  display: flex; flex-direction: column;
  min-height: 100vh;
}
.page-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 18px 32px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
  box-shadow: var(--shadow-sm);
}
.page-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 600;
  color: var(--teal-800);
}
.page-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.page-body { padding: 28px 32px; flex: 1; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  padding: 20px;
  margin-bottom: 20px;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 600; color: var(--teal-800);
}
.card-subtitle { font-size: 12px; color: var(--text-muted); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; border: none; transition: all 0.15s;
  white-space: nowrap;
}
.btn-primary { background: var(--teal-600); color: #fff; }
.btn-primary:hover { background: var(--teal-500); box-shadow: 0 2px 8px rgba(42,125,125,0.3); }
.btn-gold { background: var(--gold-500); color: #fff; }
.btn-gold:hover { background: var(--gold-600); }
.btn-outline {
  background: transparent; color: var(--teal-600);
  border: 1.5px solid var(--teal-400);
}
.btn-outline:hover { background: var(--teal-50); }
.btn-ghost { background: transparent; color: var(--text-secondary); }
.btn-ghost:hover { background: var(--surface2); }
.btn-danger { background: #c0392b; color: #fff; }
.btn-danger:hover { background: #a93226; }
.btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 6px; }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 5px; }
.btn-icon { padding: 7px; border-radius: 7px; }

/* Status badges */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 20px;
  font-size: 11px; font-weight: 500;
}
.badge-present { background: #d4edda; color: #1a6630; }
.badge-tardy { background: #fff3cd; color: #856404; }
.badge-absent { background: #f8d7da; color: #842029; }
.badge-pass { background: #d1e7dd; color: #0a3622; }
.badge-fail { background: #f8d7da; color: #842029; }
.badge-repeat { background: #fff3cd; color: #664d03; }
.badge-teal { background: var(--teal-100); color: var(--teal-700); }
.badge-gold { background: var(--gold-100); color: var(--gold-700); }

/* Form elements */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block; font-size: 12px; font-weight: 500;
  color: var(--text-secondary); margin-bottom: 5px;
}
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  color: var(--text-primary); background: var(--surface);
  transition: border-color 0.15s;
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--teal-400);
  box-shadow: 0 0 0 3px rgba(58,157,157,0.1);
}
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; padding: 10px 14px;
  font-size: 11px; font-weight: 600;
  color: var(--text-muted); letter-spacing: 0.5px;
  text-transform: uppercase;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px; color: var(--text-primary);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--teal-50); }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
.tab {
  padding: 10px 18px; font-size: 13px; font-weight: 500;
  color: var(--text-muted); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: all 0.15s; white-space: nowrap;
}
.tab:hover { color: var(--teal-600); }
.tab.active { color: var(--teal-700); border-bottom-color: var(--teal-600); font-weight: 600; }

/* Attendance buttons */
.att-btn-group { display: flex; gap: 4px; }
.att-btn {
  padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500;
  cursor: pointer; border: 1.5px solid;
  transition: all 0.12s;
}
.att-btn.present { border-color: #2e7d32; color: #2e7d32; background: transparent; }
.att-btn.present.active { background: #2e7d32; color: #fff; }
.att-btn.tardy { border-color: #f59e0b; color: #b45309; background: transparent; }
.att-btn.tardy.active { background: #f59e0b; color: #fff; }
.att-btn.absent { border-color: #c0392b; color: #c0392b; background: transparent; }
.att-btn.absent.active { background: #c0392b; color: #fff; }

/* Juz Map */
.juz-grid {
  display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px;
}
.juz-cell {
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600;
  border: 2px solid var(--border);
  transition: all 0.15s; user-select: none;
  background: var(--surface2); color: var(--text-muted);
  position: relative;
}
.juz-cell:hover { border-color: var(--teal-400); }
.juz-cell.memorized { background: var(--teal-600); color: #fff; border-color: var(--teal-600); }
.juz-cell.in-progress { background: var(--gold-300); color: var(--gold-800,#5a3e00); border-color: var(--gold-400); }
.juz-cell .juz-label { font-size: 9px; position: absolute; bottom: 3px; font-weight: 400; }

/* Calendar */
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
}
.cal-day-header {
  text-align: center; font-size: 10px; font-weight: 600;
  color: var(--text-muted); padding: 4px 0;
  text-transform: uppercase;
}
.cal-day {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  border-radius: 6px; font-size: 11px; cursor: pointer;
  color: var(--text-muted);
}
.cal-day.has-present { background: #d4edda; color: #1a6630; font-weight: 600; }
.cal-day.has-tardy { background: #fff3cd; color: #856404; font-weight: 600; }
.cal-day.has-absent { background: #f8d7da; color: #842029; font-weight: 600; }
.cal-day.today { outline: 2px solid var(--teal-500); }
.cal-day.other-month { opacity: 0.3; }

/* Date nav */
.date-nav {
  display: flex; align-items: center; gap: 12px;
}
.date-nav-btn {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--text-secondary);
  transition: all 0.12s;
}
.date-nav-btn:hover { background: var(--teal-100); color: var(--teal-700); }
.date-display {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 600; color: var(--teal-800);
  min-width: 200px; text-align: center;
}

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(13,43,43,0.55); backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
}
.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  width: 100%; max-width: 600px;
  max-height: 90vh; overflow-y: auto;
  padding: 28px;
  animation: modalIn 0.18s ease;
}
.modal-wide { max-width: 800px; }
@keyframes modalIn { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: none; } }
.modal-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 20px;
}
.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 600; color: var(--teal-800);
}
.modal-close {
  width: 30px; height: 30px; border-radius: 6px;
  background: var(--surface2); border: none; cursor: pointer;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); transition: all 0.12s;
}
.modal-close:hover { background: var(--teal-100); color: var(--teal-700); }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }

/* Stats row */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 18px 20px;
  box-shadow: var(--shadow-sm);
}
.stat-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px; font-weight: 700; color: var(--teal-700);
  line-height: 1;
}
.stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* Awards */
.award-card {
  background: linear-gradient(135deg, var(--teal-800), var(--teal-900));
  border-radius: var(--radius-lg); padding: 20px;
  color: #fff; position: relative; overflow: hidden;
}
.award-card::before {
  content: '✦'; position: absolute; right: 16px; top: 12px;
  font-size: 48px; opacity: 0.08; color: var(--gold-300);
}
.award-title { font-family: 'Cormorant Garamond', serif; font-size: 13px; color: var(--gold-300); font-weight: 500; letter-spacing: 0.5px; }
.award-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; margin: 4px 0; }
.award-reason { font-size: 11px; color: rgba(255,255,255,0.65); }

/* Email preview */
.email-preview {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  font-size: 13px; line-height: 1.7; white-space: pre-wrap;
  font-family: 'DM Sans', sans-serif;
}

/* Progress bar */
.progress-bar { background: var(--teal-100); border-radius: 20px; height: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--teal-500), var(--teal-400)); border-radius: 20px; transition: width 0.3s; }

/* Search */
.search-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 9px; padding: 7px 12px;
}
.search-bar input {
  border: none; background: transparent; outline: none;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  color: var(--text-primary); flex: 1;
}
.search-icon { color: var(--text-muted); font-size: 15px; }

/* Alert / AI box */
.ai-box {
  background: linear-gradient(135deg, var(--gold-50), #fffdf0);
  border: 1.5px solid var(--gold-300); border-radius: var(--radius);
  padding: 14px 16px; margin-top: 12px;
}
.ai-box-label { font-size: 10px; font-weight: 600; color: var(--gold-600); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }

/* Misc */
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.text-muted { color: var(--text-muted); }
.text-small { font-size: 12px; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.justify-between { justify-content: space-between; }
.mt-2 { margin-top: 8px; }
.mb-2 { margin-bottom: 8px; }
.empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-state .empty-msg { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--text-secondary); }
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 11px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text-secondary); cursor: pointer;
  transition: all 0.12s;
}
.chip.active { background: var(--teal-600); border-color: var(--teal-600); color: #fff; }
.section-divider {
  display: flex; align-items: center; gap: 10px; margin: 20px 0 14px;
}
.section-divider span {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; font-weight: 600; color: var(--teal-700); white-space: nowrap;
}
.section-divider::before, .section-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
/* Toast */
.toast-container {
  position: fixed; bottom: 24px; right: 24px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 9999; pointer-events: none;
}
.toast {
  background: var(--teal-900); color: #fff;
  padding: 12px 18px; border-radius: 10px;
  font-size: 13px; box-shadow: var(--shadow-lg);
  display: flex; align-items: center; gap: 8px;
  animation: toastIn 0.2s ease;
  pointer-events: all;
}
.toast.success { background: #1a6630; }
.toast.error { background: #842029; }
@keyframes toastIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
</style>
</head>

// LS helpers
const ls = {
  get: (k, d=null) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):d; } catch{return d;} },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch{} },
};

const uid = () => '_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36);

const fmt = {
  date: (d) => { if(!d) return ''; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); },
  shortDate: (d) => { if(!d) return ''; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); },
  today: () => new Date().toISOString().split('T')[0],
  addDays: (d, n) => { const dt=new Date(d+'T00:00:00'); dt.setDate(dt.getDate()+n); return dt.toISOString().split('T')[0]; },
};

function Toast({toasts}) {
  return <div className="toast-container">
    {toasts.map(t => <div key={t.id} className={`toast ${t.type||''}`}>
      <span>{t.type==='success'?'✓':t.type==='error'?'✕':'ℹ'}</span>{t.msg}
    </div>)}
  </div>;
}

// ============================================================
// SURAH/AYAH PICKER
// ============================================================
function SurahAyahPicker({label, value, onChange}) {
  const surahNum = value?.surah || 1;
  const ayah = value?.ayah || 1;
  const surah = SURAHS.find(s=>s.num===surahNum)||SURAHS[0];
  const ayahs = Array.from({length:surah.ayahs},(_,i)=>i+1);
  return <div>
    {label && <div className="form-label">{label}</div>}
    <div style={{display:'flex',gap:8}}>
      <select className="form-select" style={{flex:2}} value={surahNum}
        onChange={e=>onChange({surah:+e.target.value,ayah:1})}>
        {SURAHS.map(s=><option key={s.num} value={s.num}>{s.num}. {s.name}</option>)}
      </select>
      <select className="form-select" style={{flex:1}} value={ayah}
        onChange={e=>onChange({surah:surahNum,ayah:+e.target.value})}>
        {ayahs.map(a=><option key={a} value={a}>Ayah {a}</option>)}
      </select>
    </div>
  </div>;
}

function JuzQuarterPicker({label, value, onChange}) {
  const juz = value?.juz || 1;
  const quarter = value?.quarter || 0;
  return <div>
    {label && <div className="form-label">{label}</div>}
    <div style={{display:'flex',gap:8}}>
      <select className="form-select" style={{flex:1}} value={juz}
        onChange={e=>onChange({juz:+e.target.value,quarter})}>
        {Array.from({length:30},(_,i)=>i+1).map(j=><option key={j} value={j}>Juz {j}</option>)}
      </select>
      <select className="form-select" style={{flex:2}} value={quarter}
        onChange={e=>onChange({juz,quarter:+e.target.value})}>
        {QUARTERS.map((q,i)=><option key={i} value={i}>{q}</option>)}
      </select>
    </div>
  </div>;
}

function App() {
  // State
  const [page, setPage] = useState('dashboard');
  const [selectedStudentId, setSelectedStudentId] = useState(null);
  const [students, setStudents] = useState(() => ls.get('hifz_students', []));
  const [sessions, setSessions] = useState(() => ls.get('hifz_sessions', []));
  const [attendance, setAttendance] = useState(() => ls.get('hifz_attendance', {}));
  const [incidents, setIncidents] = useState(() => ls.get('hifz_incidents', []));
  const [juzTests, setJuzTests] = useState(() => ls.get('hifz_juzTests', []));
  const [goals, setGoals] = useState(() => ls.get('hifz_goals', []));
  const [awards, setAwards] = useState(() => ls.get('hifz_awards', {week:null,month:null}));
  const [toasts, setToasts] = useState([]);
  const [selectedDate, setSelectedDate] = useState(fmt.today());

  // Persist
  useEffect(()=>ls.set('hifz_students',students),[students]);
  useEffect(()=>ls.set('hifz_sessions',sessions),[sessions]);
  useEffect(()=>ls.set('hifz_attendance',attendance),[attendance]);
  useEffect(()=>ls.set('hifz_incidents',incidents),[incidents]);
  useEffect(()=>ls.set('hifz_juzTests',juzTests),[juzTests]);
  useEffect(()=>ls.set('hifz_goals',goals),[goals]);
  useEffect(()=>ls.set('hifz_awards',awards),[awards]);

  const toast = (msg,type='success') => {
    const id=uid();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3000);
  };

  const navTo = (p, sid=null) => { setPage(p); if(sid) setSelectedStudentId(sid); };

  const navProps = { students, sessions, attendance, incidents, juzTests, goals, awards,
    setStudents, setSessions, setAttendance, setIncidents, setJuzTests, setGoals, setAwards,
    toast, navTo, selectedStudentId, setSelectedStudentId, selectedDate, setSelectedDate };

  const NAV = [
    {section:'Main'},
    {id:'dashboard',label:'Dashboard',icon:'🏠'},
    {id:'students',label:'Students',icon:'👤'},
    {id:'reports',label:'Reports',icon:'📊'},
  ];

  return <div className="app-shell">
    <aside className="sidebar">
      <div className="sidebar-logo">
        <span className="crescent">☪</span>
        <div className="academy-name">Islamic Center of Frisco<br/>Quran Academy</div>
        <div className="teacher-name">Aalimah Sadaf Kamani</div>
      </div>
      <nav className="sidebar-nav">
        {NAV.map((n,i) => n.section
          ? <div key={i} className="nav-section-label">{n.section}</div>
          : <div key={n.id} className={`nav-item ${page===n.id||((page==='student-detail')&&n.id==='students')?'active':''}`}
              onClick={()=>navTo(n.id)}>
              <span className="nav-icon">{n.icon}</span>{n.label}
            </div>
        )}
      </nav>
      <div className="sidebar-footer">Hifz Management v1.0</div>
    </aside>
    <main className="main-content">
      {page==='dashboard' && <DashboardPage {...navProps}/>}
      {page==='students' && <StudentsPage {...navProps}/>}
      {page==='student-detail' && <StudentDetailPage {...navProps}/>}
      {page==='reports' && <ReportsPage {...navProps}/>}
    </main>
    <Toast toasts={toasts}/>
  </div>;
}

function DashboardPage(props) {
  const {students,sessions,attendance,incidents,awards,setAttendance,setAwards,selectedDate,setSelectedDate,toast,navTo} = props;
  const [showAIModal, setShowAIModal] = useState(null);
  const [aiResult, setAiResult] = useState('');
  const [aiLoading, setAiLoading] = useState(false);

  const dateAtt = attendance[selectedDate] || {};
  const dateSessions = sessions.filter(s=>s.date===selectedDate);
  const dateIncidents = incidents.filter(i=>i.date===selectedDate);

  const attCounts = {
    present: students.filter(s=>dateAtt[s.id]==='present').length,
    tardy: students.filter(s=>dateAtt[s.id]==='tardy').length,
    absent: students.filter(s=>dateAtt[s.id]==='absent').length,
    unmarked: students.filter(s=>!dateAtt[s.id]).length,
  };

  const setStudentAtt = (sid, status) => {
    setAttendance(prev => ({
      ...prev,
      [selectedDate]: { ...prev[selectedDate], [sid]: prev[selectedDate]?.[sid]===status ? null : status }
    }));
  };

  const getAISuggestion = async (type) => {
    setAiLoading(true); setAiResult('');
    const context = students.map(s=>{
      const sess = sessions.filter(x=>x.studentId===s.id);
      const attList = Object.values(attendance).map(d=>d[s.id]).filter(Boolean);
      const present = attList.filter(x=>x==='present').length;
      const total = attList.length;
      const juzDone = (s.juzMap||[]).filter(x=>x==='memorized').length;
      return `${s.name}: ${sess.length} sessions, ${present}/${total} attendance, ${juzDone}/30 juz memorized`;
    }).join('\n');
    const prompt = `You are a Quran Academy teacher assistant. Based on these student records, suggest the best Student of the ${type} and explain why in 2-3 sentences. Be encouraging and mention specific achievements.\n\nStudents:\n${context}\n\nRespond with: "Student of the ${type}: [Name]\nReason: [explanation]"`;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:prompt}]})
      });
      const d = await res.json();
      setAiResult(d.content?.[0]?.text || 'Unable to generate suggestion.');
    } catch(e) { setAiResult('AI suggestion unavailable. Please check connection.'); }
    setAiLoading(false);
  };

  const saveAward = (type) => {
    const match = aiResult.match(/Student of the (?:Week|Month):\s*(.+)/i);
    const reasonMatch = aiResult.match(/Reason:\s*(.+)/is);
    if(match) {
      setAwards(prev=>({...prev,[type.toLowerCase()]:{name:match[1].trim(),reason:reasonMatch?.[1]?.trim()||'',date:selectedDate}}));
      setShowAIModal(null); setAiResult('');
      toast('Award saved!');
    }
  };

  return <>
    <div className="page-header">
      <div>
        <div className="page-title">Dashboard</div>
        <div className="page-subtitle">Class overview and attendance</div>
      </div>
      <div className="date-nav">
        <button className="date-nav-btn" onClick={()=>setSelectedDate(fmt.addDays(selectedDate,-1))}>‹</button>
        <div className="date-display">{fmt.date(selectedDate)}</div>
        <button className="date-nav-btn" onClick={()=>setSelectedDate(fmt.addDays(selectedDate,1))}>›</button>
        <button className="btn btn-outline btn-sm" onClick={()=>setSelectedDate(fmt.today())}>Today</button>
      </div>
    </div>
    <div className="page-body">
      {/* Stats */}
      <div className="stats-row">
        <div className="stat-card"><div className="stat-value">{students.length}</div><div className="stat-label">Total Students</div></div>
        <div className="stat-card"><div className="stat-value" style={{color:'#2e7d32'}}>{attCounts.present}</div><div className="stat-label">Present</div></div>
        <div className="stat-card"><div className="stat-value" style={{color:'#f59e0b'}}>{attCounts.tardy}</div><div className="stat-label">Tardy</div></div>
        <div className="stat-card"><div className="stat-value" style={{color:'#c0392b'}}>{attCounts.absent}</div><div className="stat-label">Absent</div></div>
      </div>

      {/* Attendance + Awards row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:20,marginBottom:20}}>

          </div>

          <button className="modal-close" onClick={()=>{setShowAIModal(null);setAiResult('');}}>×</button>
        </div>
        {!aiResult && !aiLoading && <div>
          <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:16}}>
            Let AI analyze all student records and suggest the most deserving student of the {showAIModal} with a reason.
          </p>
          <button className="btn btn-gold" onClick={()=>getAISuggestion(showAIModal)}>✨ Generate Suggestion</button>
        </div>}
        {aiLoading && <div style={{textAlign:'center',padding:'32px 0',color:'var(--text-muted)'}}>Analyzing student records…</div>}
        {aiResult && !aiLoading && <>
          <div className="ai-box">
            <div className="ai-box-label">AI Suggestion</div>
            <div style={{fontSize:14,lineHeight:1.7,color:'var(--text-primary)',whiteSpace:'pre-wrap'}}>{aiResult}</div>
          </div>
          <div className="modal-footer">
            <button className="btn btn-ghost" onClick={()=>setAiResult('')}>Regenerate</button>
            <button className="btn btn-gold" onClick={()=>saveAward(showAIModal)}>Save Award</button>
          </div>
        </>}
      </div>
    </div>}
  </>;
}

// STUDENTS PAGE

function StudentsPage(props) {
  const {students,setStudents,sessions,toast,navTo} = props;
  const [search,setSearch]=useState('');
  const [sortBy,setSortBy]=useState('name');
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({name:'',parentName:'',email:'',phone:'',dob:'',enrollDate:fmt.today(),notes:''});

  const filtered = useMemo(()=>{
    let list=[...students];
    if(search) list=list.filter(s=>s.name.toLowerCase().includes(search.toLowerCase())||s.parentName?.toLowerCase().includes(search.toLowerCase()));
    if(sortBy==='name') list.sort((a,b)=>a.name.localeCompare(b.name));
    if(sortBy==='juz') list.sort((a,b)=>((b.juzMap||[]).filter(x=>x==='memorized').length)-((a.juzMap||[]).filter(x=>x==='memorized').length));
    return list;
  },[students,search,sortBy]);

  const addStudent = () => {
    if(!form.name.trim()){toast('Name is required','error');return;}
    const s={id:uid(),...form,juzMap:Array(30).fill(null)};
    setStudents(prev=>[...prev,s]);
    setForm({name:'',parentName:'',email:'',phone:'',dob:'',enrollDate:fmt.today(),notes:''});
    setShowAdd(false); toast('Student added!');
  };

  const deleteStudent = (id) => {
    if(!window.confirm('Delete this student? All their data will be removed.')) return;
    setStudents(prev=>prev.filter(s=>s.id!==id));
    toast('Student removed');
  };

  return <>
    <div className="page-header">
      <div><div className="page-title">Students</div><div className="page-subtitle">{students.length} enrolled</div></div>
      <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>+ Add Student</button>
    </div>
    <div className="page-body">
      <div style={{display:'flex',gap:12,marginBottom:20,alignItems:'center'}}>
        <div className="search-bar" style={{flex:1}}>
          <span className="search-icon">🔍</span>
          <input placeholder="Search by name or parent…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <div style={{display:'flex',gap:6}}>
          <span style={{fontSize:12,color:'var(--text-muted)',alignSelf:'center'}}>Sort:</span>
          <button className={`chip ${sortBy==='name'?'active':''}`} onClick={()=>setSortBy('name')}>Name</button>
          <button className={`chip ${sortBy==='juz'?'active':''}`} onClick={()=>setSortBy('juz')}>Juz Progress</button>
        </div>
      </div>
      {filtered.length===0
        ? <div className="empty-state"><div className="empty-icon">👥</div><div className="empty-msg">No students found</div></div>
        : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
            {filtered.map(s=>{
              const juzDone=(s.juzMap||[]).filter(x=>x==='memorized').length;
              const juzIP=(s.juzMap||[]).filter(x=>x==='in-progress').length;
              const stuSessions=sessions.filter(x=>x.studentId===s.id).length;
              return <div key={s.id} className="card" style={{cursor:'pointer',marginBottom:0,transition:'box-shadow 0.15s'}}
                onClick={()=>navTo('student-detail',s.id)}
                onMouseEnter={e=>e.currentTarget.style.boxShadow='var(--shadow-md)'}
                onMouseLeave={e=>e.currentTarget.style.boxShadow='var(--shadow-sm)'}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:18,fontWeight:600,color:'var(--teal-800)'}}>{s.name}</div>
                    <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>{s.parentName||'—'}</div>
                  </div>
                  <button className="btn btn-ghost btn-xs" onClick={e=>{e.stopPropagation();deleteStudent(s.id)}} style={{color:'#c0392b'}}>✕</button>
                </div>
                <hr className="divider"/>
                <div style={{marginBottom:8}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
                    <span className="text-muted">Juz Progress</span>
                    <span style={{fontWeight:600,color:'var(--teal-600)'}}>{juzDone}/30 memorized</span>
                  </div>
                  <div className="progress-bar"><div className="progress-fill" style={{width:`${(juzDone/30)*100}%`}}/></div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <span className="badge badge-teal">{juzDone} done</span>
                  {juzIP>0&&<span className="badge badge-gold">{juzIP} in progress</span>}
                  <span className="badge" style={{background:'var(--surface2)'}}>{stuSessions} sessions</span>
                </div>
              </div>;
            })}
          </div>
      }
    </div>

    {showAdd && <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">Add New Student</div>
          <button className="modal-close" onClick={()=>setShowAdd(false)}>×</button>
        </div>
        <div className="form-row">
          <div className="form-group">
            <label className="form-label">Student Name *</label>
            <input className="form-input" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Full name"/>
          </div>
          <div className="form-group">
            <label className="form-label">Parent Name</label>
            <input className="form-input" value={form.parentName} onChange={e=>setForm(p=>({...p,parentName:e.target.value}))} placeholder="Parent/Guardian"/>
          </div>
        </div>
        <div className="form-row">
          <div className="form-group">
            <label className="form-label">Email</label>
            <input className="form-input" type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} placeholder="parent@email.com"/>
          </div>
          <div className="form-group">
            <label className="form-label">Phone</label>
            <input className="form-input" value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))} placeholder="(555) 000-0000"/>
          </div>
        </div>
        <div className="form-row">
          <div className="form-group">
            <label className="form-label">Date of Birth</label>
            <input className="form-input" type="date" value={form.dob} onChange={e=>setForm(p=>({...p,dob:e.target.value}))}/>
          </div>
          <div className="form-group">
            <label className="form-label">Enrollment Date</label>
            <input className="form-input" type="date" value={form.enrollDate} onChange={e=>setForm(p=>({...p,enrollDate:e.target.value}))}/>
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Notes</label>
          <textarea className="form-textarea" value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Any additional notes…"/>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={()=>setShowAdd(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={addStudent}>Add Student</button>
        </div>
      </div>
    </div>}
  </>;
}

// ============================================================
// STUDENT DETAIL PAGE
// ============================================================
function StudentDetailPage(props) {
  const {students,setStudents,sessions,setSessions,attendance,incidents,setIncidents,juzTests,setJuzTests,goals,setGoals,toast,navTo,selectedStudentId} = props;
  const [tab,setTab]=useState('overview');
  const student = students.find(s=>s.id===selectedStudentId);

  if(!student) return <div className="page-body"><div className="empty-state"><div className="empty-msg">Student not found.</div></div></div>;

  const updateStudent = (updates) => setStudents(prev=>prev.map(s=>s.id===selectedStudentId?{...s,...updates}:s));

  const stuSessions = sessions.filter(s=>s.studentId===selectedStudentId);
  const juzDone = (student.juzMap||[]).filter(x=>x==='memorized').length;
  const allAtt = Object.entries(attendance).flatMap(([date,day])=>day[selectedStudentId]?[{date,status:day[selectedStudentId]}]:[]);

  const TABS=[
    {id:'overview',label:'Overview'},{id:'sessions',label:`Sessions (${stuSessions.length})`},
    {id:'attendance',label:'Attendance'},{id:'juzmap',label:'Juz Map'},
    {id:'patterns',label:'Patterns'},{id:'juztests',label:'Juz Tests'},
    {id:'goals',label:'Goals'},{id:'incidents',label:'Incidents'},
    {id:'emails',label:'Emails'},
  ];

  return <>
    <div className="page-header">
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>navTo('students')}>‹ Back</button>
        <div>
          <div className="page-title">{student.name}</div>
          <div className="page-subtitle">{student.parentName||'No parent info'} · Enrolled {fmt.shortDate(student.enrollDate)}</div>
        </div>
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <span className="badge badge-teal">{juzDone}/30 Juz</span>
        <span className="badge badge-gold">{stuSessions.length} Sessions</span>
      </div>
    </div>
    <div className="page-body">
      <div className="tabs">
        {TABS.map(t=><div key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</div>)}
      </div>
      {tab==='overview' && <OverviewTab student={student} sessions={stuSessions} allAtt={allAtt} updateStudent={updateStudent}/>}
      {tab==='sessions' && <SessionsTab student={student} sessions={stuSessions} setSessions={setSessions} toast={toast}/>}
      {tab==='attendance' && <AttendanceTab allAtt={allAtt}/>}
      {tab==='juzmap' && <JuzMapTab student={student} updateStudent={updateStudent} toast={toast}/>}
      {tab==='patterns' && <PatternsTab sessions={stuSessions} student={student}/>}
      {tab==='juztests' && <JuzTestsTab student={student} juzTests={juzTests} setJuzTests={setJuzTests} toast={toast}/>}
      {tab==='goals' && <GoalsTab student={student} goals={goals} setGoals={setGoals} toast={toast}/>}
      {tab==='incidents' && <IncidentsTab student={student} incidents={incidents} setIncidents={setIncidents} toast={toast}/>}
      {tab==='emails' && <EmailsTab student={student} sessions={stuSessions} allAtt={allAtt} incidents={incidents} juzTests={juzTests} goals={goals}/>}
    </div>
  </>;
}

// --- Overview Tab ---
function OverviewTab({student,sessions,allAtt,updateStudent}) {
  const juzDone=(student.juzMap||[]).filter(x=>x==='memorized').length;
  const presentCount=allAtt.filter(a=>a.status==='present').length;
  const tardyCount=allAtt.filter(a=>a.status==='tardy').length;
  const absentCount=allAtt.filter(a=>a.status==='absent').length;
  const total=allAtt.length;
  const attPct=total?Math.round((presentCount/total)*100):0;
  const [editing,setEditing]=useState(false);
  const [form,setForm]=useState({name:student.name,parentName:student.parentName||'',email:student.email||'',phone:student.phone||'',dob:student.dob||'',enrollDate:student.enrollDate||'',notes:student.notes||''});
  const save=()=>{updateStudent(form);setEditing(false);};
  return <div>
    <div className="stats-row">
      <div className="stat-card"><div className="stat-value">{juzDone}/30</div><div className="stat-label">Juz Memorized</div></div>
      <div className="stat-card"><div className="stat-value">{sessions.length}</div><div className="stat-label">Sessions</div></div>
      <div className="stat-card"><div className="stat-value">{attPct}%</div><div className="stat-label">Attendance Rate</div><div className="stat-sub">{absentCount} absent, {tardyCount} tardy</div></div>
      <div className="stat-card"><div className="stat-value">{total}</div><div className="stat-label">Days Recorded</div></div>
    </div>
    <div className="card">
      <div className="card-header">
        <div className="card-title">Student Profile</div>
        <button className="btn btn-outline btn-sm" onClick={()=>setEditing(!editing)}>{editing?'Cancel':'Edit'}</button>
      </div>
      {editing?<>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Name</label><input className="form-input" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
          <div className="form-group"><label className="form-label">Parent Name</label><input className="form-input" value={form.parentName} onChange={e=>setForm(p=>({...p,parentName:e.target.value}))}/></div>
        </div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))}/></div>
          <div className="form-group"><label className="form-label">Phone</label><input className="form-input" value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))}/></div>
        </div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Date of Birth</label><input className="form-input" type="date" value={form.dob} onChange={e=>setForm(p=>({...p,dob:e.target.value}))}/></div>
          <div className="form-group"><label className="form-label">Enrollment Date</label><input className="form-input" type="date" value={form.enrollDate} onChange={e=>setForm(p=>({...p,enrollDate:e.target.value}))}/></div>
        </div>
        <div className="form-group"><label className="form-label">Notes</label><textarea className="form-textarea" value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))}/></div>
        <button className="btn btn-primary" onClick={save}>Save Changes</button>
      </>:<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        {[['Parent/Guardian',student.parentName],['Email',student.email],['Phone',student.phone],
          ['Date of Birth',student.dob?fmt.shortDate(student.dob):'—'],
          ['Enrollment Date',student.enrollDate?fmt.shortDate(student.enrollDate):'—'],
          ['Notes',student.notes]
        ].map(([l,v])=><div key={l}>
          <div style={{fontSize:11,color:'var(--text-muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:.5,marginBottom:3}}>{l}</div>
          <div style={{fontSize:13}}>{v||'—'}</div>
        </div>)}
      </div>}
    </div>
  </div>;
}

// --- Sessions Tab ---
function SessionsTab({student,sessions,setSessions,toast}) {
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [mode,setMode]=useState('surah');
  const emptyForm=()=>({
    date:fmt.today(), sabaqMode:'surah',
    sabaqStart:{surah:1,ayah:1}, sabaqEnd:{surah:1,ayah:7},
    sabaqStartJQ:{juz:1,quarter:0}, sabaqEndJQ:{juz:1,quarter:0},
    manzilStart:{surah:1,ayah:1}, manzilEnd:{surah:1,ayah:7},
    manzilStartJQ:{juz:1,quarter:0}, manzilEndJQ:{juz:1,quarter:0},
    sabqiResult:'', manzilResult:'', mistakes:[], notes:'',
    lateSabaq:false, leftEarly:false, lateFromLunch:false,
  });
  const [form,setForm]=useState(emptyForm());

  const openEdit=(s)=>{
    setForm({...s});setEditId(s.id);setMode(s.sabaqMode||'surah');setShowForm(true);
  };
  const saveSession=()=>{
    const sess={...form,id:editId||uid(),studentId:student.id,sabaqMode:mode};
    setSessions(prev=>editId?prev.map(s=>s.id===editId?sess:s):[...prev,sess]);
    setShowForm(false);setEditId(null);setForm(emptyForm());
    toast(editId?'Session updated!':'Session logged!');
  };
  const deleteSession=(id)=>{
    if(!window.confirm('Delete this session?')) return;
    setSessions(prev=>prev.filter(s=>s.id!==id));
    toast('Session deleted');
  };
  const sortedSessions=[...sessions].sort((a,b)=>b.date.localeCompare(a.date));

  const sabaqDesc=(s)=>{
    if(s.sabaqMode==='juz') {
      const sq=s.sabaqStartJQ;const eq=s.sabaqEndJQ;
      return sq?`Juz ${sq.juz} Q${sq.quarter+1} → Juz ${eq?.juz||sq.juz} Q${(eq?.quarter||0)+1}`:'—';
    }
    const ss=s.sabaqStart;const se=s.sabaqEnd;
    if(!ss)return'—';
    const sn=SURAHS.find(x=>x.num===ss.surah)?.name||'?';
    const en=SURAHS.find(x=>x.num===se?.surah)?.name||'?';
    return `${sn} ${ss.ayah} → ${en} ${se?.ayah||'?'}`;
  };

  return <>
    <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}>
      <button className="btn btn-primary" onClick={()=>{setShowForm(true);setEditId(null);setForm(emptyForm());}}>+ Log Session</button>
    </div>
    {sortedSessions.length===0
      ? <div className="empty-state"><div className="empty-icon">📖</div><div className="empty-msg">No sessions logged yet</div></div>
      : <div className="table-wrap"><table>
          <thead><tr><th>Date</th><th>Sabaq</th><th>Manzil</th><th>Sabqi</th><th>Manzil Result</th><th>Flags</th><th></th></tr></thead>
          <tbody>
            {sortedSessions.map(s=><tr key={s.id}>
              <td style={{whiteSpace:'nowrap'}}>{fmt.shortDate(s.date)}</td>
              <td style={{fontSize:12,maxWidth:180}}>{sabaqDesc(s)}</td>
              <td style={{fontSize:12}}>{s.manzilStart?`Juz${s.manzilStart.surah||'?'}...`:'—'}</td>
              <td><span className={`badge badge-${s.sabqiResult==='pass'?'pass':s.sabqiResult==='fail'?'fail':'teal'}`}>{s.sabqiResult||'—'}</span></td>
              <td><span className={`badge badge-${s.manzilResult==='pass'?'pass':s.manzilResult==='fail'?'fail':'teal'}`}>{s.manzilResult||'—'}</span></td>
              <td style={{fontSize:11}}>
                {s.lateSabaq&&<span title="Late Sabaq">⏰</span>}
                {s.leftEarly&&<span title="Left Early">🚶</span>}
                {s.lateFromLunch&&<span title="Late from Lunch">🍽️</span>}
              </td>
              <td>
                <div style={{display:'flex',gap:4}}>
                  <button className="btn btn-ghost btn-xs" onClick={()=>openEdit(s)}>✏️</button>
                  <button className="btn btn-ghost btn-xs" style={{color:'#c0392b'}} onClick={()=>deleteSession(s.id)}>🗑</button>
                </div>
              </td>
            </tr>)}
          </tbody>
        </table></div>
    }

    {showForm && <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
      <div className="modal modal-wide">
        <div className="modal-header">
          <div className="modal-title">{editId?'Edit Session':'Log Session'} — {student.name}</div>
          <button className="modal-close" onClick={()=>setShowForm(false)}>×</button>
        </div>
        <div className="form-group">
          <label className="form-label">Date</label>
          <input className="form-input" type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} style={{maxWidth:200}}/>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          <span style={{fontSize:12,color:'var(--text-muted)',alignSelf:'center'}}>Input mode:</span>
          <button className={`chip ${mode==='surah'?'active':''}`} onClick={()=>setMode('surah')}>Surah + Ayah</button>
          <button className={`chip ${mode==='juz'?'active':''}`} onClick={()=>setMode('juz')}>Juz + Quarter</button>
        </div>

        <div className="section-divider"><span>Sabaq (New Lesson)</span></div>
        <div className="form-row">
          {mode==='surah'
            ?<><SurahAyahPicker label="Start" value={form.sabaqStart} onChange={v=>setForm(p=>({...p,sabaqStart:v}))}/>
               <SurahAyahPicker label="End" value={form.sabaqEnd} onChange={v=>setForm(p=>({...p,sabaqEnd:v}))}/></>
            :<><JuzQuarterPicker label="Start" value={form.sabaqStartJQ} onChange={v=>setForm(p=>({...p,sabaqStartJQ:v}))}/>
               <JuzQuarterPicker label="End" value={form.sabaqEndJQ} onChange={v=>setForm(p=>({...p,sabaqEndJQ:v}))}/></>
          }
        </div>

        <div className="section-divider"><span>Manzil (Review)</span></div>
        <div className="form-row">
          {mode==='surah'
            ?<><SurahAyahPicker label="Start" value={form.manzilStart} onChange={v=>setForm(p=>({...p,manzilStart:v}))}/>
               <SurahAyahPicker label="End" value={form.manzilEnd} onChange={v=>setForm(p=>({...p,manzilEnd:v}))}/></>
            :<><JuzQuarterPicker label="Start" value={form.manzilStartJQ} onChange={v=>setForm(p=>({...p,manzilStartJQ:v}))}/>
               <JuzQuarterPicker label="End" value={form.manzilEndJQ} onChange={v=>setForm(p=>({...p,manzilEndJQ:v}))}/></>
          }
        </div>

        <div className="section-divider"><span>Results</span></div>
        <div className="form-row">
          <div className="form-group">
            <label className="form-label">Sabqi Result</label>
            <select className="form-select" value={form.sabqiResult} onChange={e=>setForm(p=>({...p,sabqiResult:e.target.value}))}>
              <option value="">— Select —</option>
              <option value="pass">Pass</option>
              <option value="fail">Fail</option>
              <option value="needs-repeat">Needs Repeat</option>
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Manzil Result</label>
            <select className="form-select" value={form.manzilResult} onChange={e=>setForm(p=>({...p,manzilResult:e.target.value}))}>
              <option value="">— Select —</option>
              <option value="pass">Pass</option>
              <option value="fail">Fail</option>
              <option value="needs-repeat">Needs Repeat</option>
            </select>
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">Mistake Types</label>

// --- Attendance Calendar Tab ---
function AttendanceTab({allAtt}) {
  const [viewDate,setViewDate]=useState(new Date());
  const year=viewDate.getFullYear(), month=viewDate.getMonth();
  const attMap={};
  allAtt.forEach(a=>{ attMap[a.date]=a.status; });

  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const prevDays=new Date(year,month,0).getDate();
  const cells=[];
  for(let i=firstDay-1;i>=0;i--) cells.push({day:prevDays-i,other:true});
  for(let d=1;d<=daysInMonth;d++){
    const key=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({day:d,key,status:attMap[key]});
  }
  const remaining=42-cells.length;
  for(let d=1;d<=remaining;d++) cells.push({day:d,other:true});

  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const totals={present:allAtt.filter(a=>a.status==='present').length,tardy:allAtt.filter(a=>a.status==='tardy').length,absent:allAtt.filter(a=>a.status==='absent').length};

  return <div>
    <div style={{display:'flex',gap:12,marginBottom:20}}>
      <span className="badge badge-present">✓ Present: {totals.present}</span>
      <span className="badge badge-tardy">⏰ Tardy: {totals.tardy}</span>
      <span className="badge badge-absent">✕ Absent: {totals.absent}</span>
    </div>
    <div className="card">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <button className="date-nav-btn" onClick={()=>setViewDate(new Date(year,month-1,1))}>‹</button>
        <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:20,fontWeight:600,flex:1,textAlign:'center'}}>{monthNames[month]} {year}</div>
        <button className="date-nav-btn" onClick={()=>setViewDate(new Date(year,month+1,1))}>›</button>
      </div>
      <div className="cal-grid">
        {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d} className="cal-day-header">{d}</div>)}
        {cells.map((c,i)=>{
          const today=fmt.today();
          const isToday=c.key===today;
          return <div key={i} className={`cal-day ${c.other?'other-month':''} ${c.status?'has-'+c.status:''} ${isToday?'today':''}`} title={c.status||''}>
            {c.day}
          </div>;
        })}
      </div>
    </div>
  </div>;
}

// --- Juz Map Tab ---
function JuzMapTab({student,updateStudent,toast}) {
  const juzMap = student.juzMap || Array(30).fill(null);

  const cycleJuz = (i) => {
    const cur = juzMap[i];
    const next = cur === null ? 'memorized' : cur === 'memorized' ? 'in-progress' : null;
    const newMap = [...juzMap]; newMap[i] = next;
    updateStudent({juzMap: newMap});
  };

  const rightClickJuz = (e, i) => {
    e.preventDefault();
    const cur = juzMap[i];
    const next = cur === 'in-progress' ? null : 'in-progress';
    const newMap = [...juzMap]; newMap[i] = next;
    updateStudent({juzMap: newMap});
  };

  const memorized = juzMap.filter(x=>x==='memorized').length;
  const inProg = juzMap.filter(x=>x==='in-progress').length;

  return <div>
    <div style={{display:'flex',gap:12,marginBottom:20,alignItems:'center',flexWrap:'wrap'}}>
      <span className="badge badge-teal" style={{fontSize:13,padding:'6px 14px'}}>✓ Memorized: {memorized}/30</span>
      <span className="badge badge-gold" style={{fontSize:13,padding:'6px 14px'}}>⬤ In Progress: {inProg}</span>
      <span className="text-muted text-small">Click = memorized → in-progress → clear | Right-click = toggle in-progress</span>
    </div>
    <div className="card">
      <div style={{marginBottom:16}}>
        <div className="progress-bar" style={{height:12}}>
          <div className="progress-fill" style={{width:`${(memorized/30)*100}%`}}/>
        </div>
        <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>{Math.round((memorized/30)*100)}% complete</div>
      </div>
      <div className="juz-grid">
        {Array.from({length:30},(_,i)=>{
          const status=juzMap[i];
          return <div key={i} className={`juz-cell ${status||''}`}
            onClick={()=>cycleJuz(i)}
            onContextMenu={e=>rightClickJuz(e,i)}
            title={`Juz ${i+1} — ${status||'not started'}`}>
            {i+1}
            <span className="juz-label">{status==='memorized'?'✓':status==='in-progress'?'…':''}</span>
          </div>;
        })}
      </div>
    </div>
  </div>;
}

    const latestGoal=goals.filter(g=>g.studentId===student.id&&g.achieved).slice(-1)[0];
    const latestInc=incidents.filter(i=>i.studentId===student.id).slice(-1)[0];

    const header=`Assalamu Alaikum wa Rahmatullahi wa Barakatuh,\n\nDear ${student.parentName||'Parent/Guardian'},\n\nI hope this message finds you and your family in the best of health and iman. My name is Aalimah Sadaf Kamani, and I am writing regarding your child, ${student.name}, enrolled at the Islamic Center of Frisco Quran Academy Hifz Program.\n\n`;
    const footer=`\n${customNote?customNote+'\n\n':''}JazakAllahu Khayran for your continued support of ${student.name}'s Hifz journey. Please feel free to contact me with any questions.\n\nWarm regards,\nAalimah Sadaf Kamani\nHifz Teacher — ICF Quran Academy\nIslamic Center of Frisco`;

    let body='';
    if(emailType==='absence') body=`I am writing to inform you that ${student.name} has been marked absent from our Hifz class. As of today, ${d}, ${student.name} has a total of ${absent} absence(s) and ${tardy} tardy occurrence(s) this term.\n\nRegular attendance is essential to the success of the Hifz program. Each missed day creates gaps in the memorization process that require additional effort to bridge. We kindly request that you ensure ${student.name} attends consistently. If there are any extenuating circumstances, please let us know so we may accommodate accordingly.`;
    else if(emailType==='tardy') body=`I wanted to bring to your attention that ${student.name} has arrived late to Hifz class. Punctuality is extremely important in the Hifz program, as late arrivals disrupt the structured learning environment and result in missed sabaq time.\n\nThis term, ${student.name} has ${tardy} tardy occurrence(s). We ask that you please make arrangements to ensure timely arrival. Doors open 10 minutes before class begins.`;
    else if(emailType==='progress') body=`I am pleased to share a progress update on ${student.name}. Alhamdulillah, ${student.name} has made commendable progress in their Hifz journey.\n\n📖 Juz Memorized: ${juzDone} out of 30\n📅 Total Sessions Completed: ${sessions.length}\n✅ Attendance Rate: ${allAtt.length?Math.round((allAtt.filter(a=>a.status==='present').length/allAtt.length)*100):0}%\n\nWe encourage continued practice at home (daily manzil revision) to solidify what has been memorized. Please ensure ${student.name} revises their assigned portion each evening.`;
    else if(emailType==='incident') body=`I am reaching out regarding an incident that occurred involving ${student.name}${latestInc?` on ${fmt.shortDate(latestInc.date)}`:''}. ${latestInc?latestInc.description:'Please contact me to discuss the details.'}\n\n${latestInc?.followUp?`Action taken: ${latestInc.followUp}\n\n`:''}We value open communication between home and the academy. This notice is being shared to keep you informed so we may work together to support ${student.name} in developing the best character alongside their Quran.`;
    else if(emailType==='juz-pass') body=`Alhamdulillah! It is with great joy that I inform you ${student.name} has successfully passed their Juz Test${latestPass?` for Juz ${latestPass.juz} on ${fmt.shortDate(latestPass.date)}`:''}! 🌟\n\nThis is a wonderful achievement and a testament to ${student.name}'s dedication, consistency, and hard work. Please take a moment to celebrate this milestone with your child — your encouragement means the world to them.\n\nMay Allah ﷻ bless ${student.name} with barakah in their memorization and grant them the complete Hifz with understanding and love. Ameen.`;
    else if(emailType==='goal') body=`Alhamdulillah! I am delighted to share that ${student.name} has achieved a goal set in our Hifz program${latestGoal?`: "${latestGoal.title}"`:''}! 🎯🏆\n\nThis accomplishment reflects ${student.name}'s commitment and your family's support. Goals help our students develop discipline and a sense of ownership over their Hifz journey.\n\nWe look forward to setting the next milestone together. JazakAllahu Khayran for your ongoing partnership in this blessed endeavor.`;

    setEmailBody(header+body+footer);
  };

  const copyEmail=()=>{
    navigator.clipboard.writeText(emailBody).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  };

  return <div>
    <div className="card">
      <div className="card-title" style={{marginBottom:16}}>Parent Email Generator</div>
      <div className="form-group">
        <label className="form-label">Email Type</label>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {[['absence','Absence Notice'],['tardy','Tardy Notice'],['progress','Progress Update'],
            ['incident','Incident Report'],['juz-pass','Juz Test Pass 🎉'],['goal','Goal Achieved 🏆']].map(([v,l])=>(
            <button key={v} className={`chip ${emailType===v?'active':''}`} onClick={()=>{setEmailType(v);setEmailBody('');}}>
              {l}
            </button>
          ))}
        </div>
      </div>
      <div className="form-group">
        <label className="form-label">Additional Note (optional)</label>
        <textarea className="form-textarea" value={customNote} onChange={e=>setCustomNote(e.target.value)} placeholder="Add a personal note to include in the email…" style={{minHeight:60}}/>
      </div>
      <button className="btn btn-primary" onClick={generateEmail}>Generate Email</button>
    </div>

    {emailBody && <div className="card">
      <div className="card-header">
        <div className="card-title">Generated Email</div>
        <button className="btn btn-outline btn-sm" onClick={copyEmail}>{copied?'✓ Copied!':'📋 Copy'}</button>
      </div>
      <div className="email-preview">{emailBody}</div>
    </div>}
  </div>;
}

// ============================================================
// REPORTS PAGE
// ============================================================
function ReportsPage({students,sessions,attendance,incidents,juzTests,goals}) {
  const [period,setPeriod]=useState('weekly');
  const today=fmt.today();

  const filterByPeriod=(items,dateKey)=>{
    const now=new Date(today);
    return items.filter(item=>{
      const d=new Date(item[dateKey]+'T00:00:00');
      const diff=(now-d)/86400000;
      if(period==='daily') return diff<1;
      if(period==='weekly') return diff<=7;
      if(period==='monthly') return diff<=30;
      return true;
    });
  };

  const pSessions=filterByPeriod(sessions,'date');
  const pIncidents=filterByPeriod(incidents,'date');
  const pTests=filterByPeriod(juzTests,'date');

  const attByStudent=students.map(s=>{
    const entries=Object.entries(attendance).filter(([date])=>{
      const d=new Date(date+'T00:00:00'),now=new Date(today),diff=(now-d)/86400000;
      return period==='daily'?diff<1:period==='weekly'?diff<=7:diff<=30;
    }).map(([,day])=>day[s.id]).filter(Boolean);
    const present=entries.filter(x=>x==='present').length;
    const total=entries.length;
    return {student:s,present,total,tardy:entries.filter(x=>x==='tardy').length,absent:entries.filter(x=>x==='absent').length};
  }).sort((a,b)=>b.total-a.total);

  return <>
    <div className="page-header">
      <div><div className="page-title">Reports</div><div className="page-subtitle">Academy-wide statistics</div></div>
      <div style={{display:'flex',gap:8}}>
        {['daily','weekly','monthly'].map(p=><button key={p} className={`chip ${period===p?'active':''}`} onClick={()=>setPeriod(p)}>{p.charAt(0).toUpperCase()+p.slice(1)}</button>)}
      </div>
    </div>
    <div className="page-body">
      <div className="stats-row">
        <div className="stat-card"><div className="stat-value">{pSessions.length}</div><div className="stat-label">Sessions</div><div className="stat-sub">this {period.replace('ly','')}</div></div>
        <div className="stat-card"><div className="stat-value">{pTests.filter(t=>t.result==='pass').length}</div><div className="stat-label">Juz Tests Passed</div></div>
        <div className="stat-card"><div className="stat-value">{pIncidents.length}</div><div className="stat-label">Incidents</div></div>
        <div className="stat-card"><div className="stat-value">{students.reduce((a,s)=>(a+(s.juzMap||[]).filter(x=>x==='memorized').length),0)}</div><div className="stat-label">Total Juz Memorized</div><div className="stat-sub">across all students</div></div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <div className="card">
          <div className="card-title" style={{marginBottom:16}}>Attendance Summary — {period}</div>
          {attByStudent.filter(a=>a.total>0).length===0
            ? <div className="text-muted text-small">No attendance data for this period</div>
            : <div className="table-wrap"><table>
                <thead><tr><th>Student</th><th>Present</th><th>Tardy</th><th>Absent</th><th>Rate</th></tr></thead>
                <tbody>
                  {attByStudent.filter(a=>a.total>0).map(({student:s,present,tardy,absent,total})=>(
                    <tr key={s.id}>
                      <td style={{fontWeight:500}}>{s.name}</td>
                      <td><span className="badge badge-present">{present}</span></td>
                      <td><span className="badge badge-tardy">{tardy}</span></td>
                      <td><span className="badge badge-absent">{absent}</span></td>
                      <td>{total?Math.round((present/total)*100):0}%</td>
                    </tr>
                  ))}
                </tbody>
              </table></div>
          }
        </div>

        <div className="card">
          <div className="card-title" style={{marginBottom:16}}>Juz Progress — All Students</div>
          <div className="table-wrap"><table>
            <thead><tr><th>Student</th><th>Memorized</th><th>In Progress</th><th>Progress</th></tr></thead>
            <tbody>
              {[...students].sort((a,b)=>((b.juzMap||[]).filter(x=>x==='memorized').length)-((a.juzMap||[]).filter(x=>x==='memorized').length)).map(s=>{
                const done=(s.juzMap||[]).filter(x=>x==='memorized').length;
                const ip=(s.juzMap||[]).filter(x=>x==='in-progress').length;
                return <tr key={s.id}>
                  <td style={{fontWeight:500}}>{s.name}</td>
                  <td>{done}/30</td>
                  <td>{ip}</td>
                  <td><div className="progress-bar" style={{width:80}}><div className="progress-fill" style={{width:`${(done/30)*100}%`}}/></div></td>
                </tr>;
              })}
            </tbody>
          </table></div>
        </div>

        <div className="card">
          <div className="card-title" style={{marginBottom:16}}>Juz Tests — {period}</div>
          {pTests.length===0
            ? <div className="text-muted text-small">No tests in this period</div>
            : <div className="table-wrap"><table>
                <thead><tr><th>Date</th><th>Student</th><th>Juz</th><th>Result</th></tr></thead>
                <tbody>
                  {pTests.map(t=>{
                    const s=students.find(x=>x.id===t.studentId);
                    return <tr key={t.id}>
                      <td>{fmt.shortDate(t.date)}</td>
                      <td>{s?.name||'?'}</td>
                      <td>Juz {t.juz}</td>
                      <td><span className={`badge badge-${t.result}`}>{t.result}</span></td>
                    </tr>;
                  })}
                </tbody>
              </table></div>
          }
        </div>

        <div className="card">
          <div className="card-title" style={{marginBottom:16}}>Incidents — {period}</div>
          {pIncidents.length===0
            ? <div className="text-muted text-small">No incidents in this period</div>
            : pIncidents.map(inc=>{
                const s=students.find(x=>x.id===inc.studentId);
                return <div key={inc.id} style={{padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                    <span style={{fontWeight:500}}>{s?.name}</span>
                    <span className="badge badge-absent">{inc.type}</span>
                  </div>
                  <div style={{fontSize:12,color:'var(--text-muted)'}}>{fmt.shortDate(inc.date)} · {inc.description?.slice(0,80)}</div>
                </div>;
              })
          }
        </div>
      </div>
    </div>
  </>;
}

// ============================================================
// RENDER
// ============================================================
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
